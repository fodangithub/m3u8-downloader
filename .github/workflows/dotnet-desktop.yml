name: .NET CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore
      run: dotnet restore m3u8-downloader.sln

    - name: Build
      run: dotnet build m3u8-downloader.sln --configuration Release --no-restore

    - name: Publish
      run: dotnet publish M3U8Downloader.csproj -c Release -r win-x64 --self-contained -p:PublishSingleFile=true -p:PublishDir=publish

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: m3u8-downloader-win-x64
        path: publish/
